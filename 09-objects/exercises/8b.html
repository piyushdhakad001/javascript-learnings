<!-- Continuing from 8a, lets say we want to increase the the price by 500 cents. use dot notation to increase the price, and display the updated object in the console. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Objects</title>
</head>
<body>
   <script>
    const product = {
      name: 'basketball',
      price: 2095 
    }
    product.price = product.price + 500
    console.log(product);
    console.log(product.price);
   </script>
</body>
</html>
