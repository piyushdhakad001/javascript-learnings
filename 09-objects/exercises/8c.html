<!-- Using bracket notation, add a property 'delievery-time' to the object with the value '3 days'. Display the updated object in the console. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Objects</title>
</head>
<body>
   <script>
    const product = {
      name: 'basketball',
      price: 2095 ,
      ['delievery-time']:  '3days'
    }
    product.price = product.price + 500
    console.log(product);
    console.log(product.price);
    console.log(product['delievery-time'])
   </script>
</body>
</html>
