<!-- Use localStorage to save and load the score (hint: you'll need to use JSON.stringify() to convert the score object to a string).  -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>coin-flip Game</title>
</head>
<body>

  <button onclick="
    coinFlipGame('heads');
    ">heads</button>

  <button  onclick="
      coinFlipGame('tails');
    ">tails</button>
  <script>
    const score =  JSON.parse(localStorage.getItem('scoreCopy')) || {
      wins: 0,
      losses: 0
    };

    let guess = '';
    let result = '';
    function coinFlipGame(guess){
      const randNum = Math.random();
      let flipResult = (randNum >= 0.5) ? 'heads' : 'tails';
      if(flipResult === guess){
        result = 'you win';
        score.wins++;
      } else {
        result = 'You lose';
        score.losses++;
      }

      
      localStorage.setItem('scoreCopy', JSON.stringify(score));

      console.log(`"${result}" \n wins: ${score.wins} and losses: ${score.losses}`);
      
    }
    
  </script>
</body>
</html>
