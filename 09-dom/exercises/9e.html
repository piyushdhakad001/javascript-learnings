<!-- Modify exercise 9d so that when you press 'Enter' in the <input>, it will also display the same message on the page (hint: use onkydown and the event object). -->

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Document</title>
</head>

<body>
  <input class="js-username" type="text" placeholder="Name" onkeydown="
    if(event.key === 'Enter'){
      
       inPut();
  }
    ">

  <button onclick="
     inPut();
  ">Submit</button>

  <p class="js-name"></p>

  <script>
    function inPut() {
      const text = document.querySelector('.js-username').value;
      document.querySelector('.js-name').innerHTML = `Your name is: ${text}`;
    }
  </script>


</body>

</html>
