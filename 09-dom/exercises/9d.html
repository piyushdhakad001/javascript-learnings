<!-- Create a text box(<input>) and a submit button. When clicking 'Submit', display 'Your name is: ${text}' on the page (${text} = the text inside the text box) (hint: use.value to get the text inside an <input>). -->
 
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<body>
  <input class="js-username" type="text" placeholder="Name">

  <button onclick="
  const text = document.querySelector('.js-username').value;
  document.querySelector('.js-name').innerHTML = `Your name is: ${text}`;
  
  ">Submit</button>

  <p class="js-name"></p>
  
</body>
</html>
