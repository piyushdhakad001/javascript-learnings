<!-- We'll improve the Cart Quantity project.
 -> Make a copy of exercise 7l (see the sollution for 7l if needed).
 -> Create a paragraph (<p></p>) to display the quantity.
 -> Whenever we update the quantity, display it on the page instead of in the console. Also, display the quantity when page first loads -->

 <!-- Modify 'updateCartQuantity' so that the quantity is invalid, alert();
 and then return; (this is called an early return). An early return make our code cleaner because we can remove the 'else-if' / 'else'. -->

<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="
      // Display the cart quantity on the page
      // instead of in the console.
      displayCartQuantity();
    ">Show Quantity</button>

    <button onclick="
      updateCartQuantity(1);
    ">Add to Cart</button>

    <button onclick="
      updateCartQuantity(2);
    ">+2</button>

    <button onclick="
      updateCartQuantity(3);
    ">+3</button>

    <button onclick="
      updateCartQuantity(4);
    ">+4</button>

    <button onclick="
      updateCartQuantity(5);
    ">+5</button>

    <button onclick="
      updateCartQuantity(-1);
    ">Remove from cart</button>

    <button onclick="
      updateCartQuantity(-2);
    ">-2</button>

    <button onclick="
      updateCartQuantity(-3);
    ">-3</button>

    <button onclick="
      cartQuantity = 0;
      console.log('Cart was reset.');
     

      // Display the cart quantity after updating.
      displayCartQuantity();
    ">Reset Cart</button>

    <!-- Create an element to display the cart quantity. -->
    <p class="js-cart-quantity">Cart quantity: 0</p>

    <script>
      let cartQuantity = 0;

      function updateCartQuantity(change){
        if(cartQuantity + change > 10){
          alert('Cart is full')
          return;
        }
        if(cartQuantity + change < 0){
          alert('Not Enough items in Cart')
          return;
        }

        cartQuantity += change;
        displayCartQuantity();
        
      }

      function displayCartQuantity() {
        document.querySelector('.js-cart-quantity')
          .innerHTML = `Cart quantity: ${cartQuantity}`;
      }
    </script>
  </body>
</html>
