<!-- We'll add localStorage to the calculater project. First, make a copy of the project from exercise 7j (see the sollution for 7j if needed).
 ~ Whenever we update the calculation, save it using .setItem()
 ~ When the page first loads, get the calculation using .getItem() 
 ~ Use a default value of'' if a calculation doesn't exist in local Storage-->

 
<!DOCTYPE html>
<html lang="en">

<head>
  <title>Calculator</title>
</head>

<body>

  <p>Calculator</p>

  <p>
    <button onclick="
      calculator('1');
      ">1</button>

    <button onclick="
    calculator('2');
      ">2</button>

    <button onclick="
    calculator('3');
      ">3</button>

    <button onclick="
    calculator(' + ');
      ">+</button>





  </p>

  <p>
    <button onclick="
    calculator('4');
      ">4</button>

    <button onclick="
    calculator('5');
      ">5</button>

    <button onclick="
    calculator('6');
      ">6</button>

    <button onclick="
    calculator(' - ');
      ">-</button>
  </p>

  <p>
    <button onclick="
    calculator('7');
      ">7</button>

    <button onclick="
    calculator('8');
      ">8</button>

    <button onclick="
    calculator('9');
      ">9</button>

    <button onclick="
    calculator(' * ');
      ">*</button>
  </p>

  <p>
    <button onclick="
    calculator('0');
      ">0</button>

    <button onclick="
      calculator('.');
      ">.</button>

    <button onclick="
      // calculation = eval(calculation);
      calculator('=');
     ">=</button>

    <button onclick="
      calculator(' / ')
      ">/</button>
  </p>

  <p>
    <button onclick="
      calculator('Clear')
      ">Clear</button>
  </p>


  <script>
    // let calculation = '';
     let calculation = localStorage.getItem('myResult') || '';

     
    function calculator(button) {

      if (button === '1') {
        calculation += '1';

      } else if (button === '2') {
        calculation += '2';

      } else if (button === '3') {
        calculation += '3';

      } else if (button === ' + ') {
        calculation += ' + ';

      } else if (button === '4') {
        calculation += '4';

      } else if (button === '5') {
        calculation += '5';

      } else if (button === '6') {
        calculation += '6';

      } else if (button === ' - ') {
        calculation += ' - ';

      } else if (button === '7') {
        calculation += '7';

      } else if (button === '8') {
        calculation += '8';

      } else if (button === '9') {
        calculation += '9';

      } else if (button === ' * ') {
        calculation += ' * ';

      } else if (button === '0') {
        calculation += '0';

      } else if (button === '.') {
        calculation += '.';

      } else if (button === '=') {
         calculation = `calculation : ${eval(calculation)}`;
      }

      else if (button === ' / ') {
        calculation += ' / ';

      } else if (button === 'Clear') {
        calculation = '';

      }
      console.log(calculation);
      localStorage.setItem('myResult', calculation);

    }
  </script>
</body>

</html>
