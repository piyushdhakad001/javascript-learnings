<!DOCTYPE html>
<html lang="en">
<head>
  <title>coin-flip Game</title>
</head>
<body>

  <button onclick="
    coinFlipGame('heads');
    ">heads</button>

  <button  onclick="
      coinFlipGame('tails');
    ">tails</button>
  <script>

    let guess = '';
    let result = '';
    function coinFlipGame(guess){
      const randNum = Math.random();
      let flipResult = (randNum >= 0.5) ? 'heads' : 'tails';
      if(flipResult === guess){
        result = 'you win';
      } else {
        result = 'You lose';
      }
      console.log(result);
    }
    
  </script>
</body>
</html>
