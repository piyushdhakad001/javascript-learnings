<!-- Using Google or an A.I. tool,search how to convert a string to all lowercase with JavaScript ('Good Morning' => 'good morning') -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Object</title>
</head>
<body>
  <script>
   let  string  = 'Good Morning';
   string = string.toLowerCase();
   console.log(string);
  </script>
</body>
</html>
