<!-- Create a function addNum(array, num) that takes an array of numbers and returns an array where each number is increased by 'num'. Create this function using .map() instead of a loop.
 -> addNum([1, 2, 3], 2) => [3, 4, 5] 
 -> addNum([-2, -1, 0, 99], 2) => [0, 1, 2, 10]
 Bonus: try to use the one-line shortcut in your solution.-->

 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Document</title>
 </head>
 <body>
  <script>
    
   function addNum(value, num){
    // return value.map((value) => {
    //   return value + num;
    // })
     
    return value.map((value) => value + num);

   }


    console.log(addNum([1, 2, 3], 2));
    console.log(addNum([-2, -1, 0, 99], 2));
    </script>
 </body>
 </html>
