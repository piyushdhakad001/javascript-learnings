<!-- Create a function countPositive(nums) that takes an array of numbers and returns how many numbers in the array are greater than 0. Create this function using .forEach(); instead of a loop.
 
-> countPositive([1, -3, 5]) => 2
-> countPositive([-2, 3, -5, 7, 10]) => 3-->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<body>
  <script>
    function countPositive(nums){
      let positiveNumbers = '';

      nums.forEach((value) => {
        if(value >= 0 ){
        positiveNumbers++;
        }
        
      });
      return positiveNumbers;
    }
    console.log(countPositive([1, -3, 5]));
    console.log(countPositive([-2, 3, -5, 7, 10]));
   
  </script>
</body>
</html>
