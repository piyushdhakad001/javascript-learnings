<!-- At a restaurant, you order 1 coffee ($5), 2 bagels ($3 each), and 1 soup ($9). Calculate the cost and save it in a variable called 'cost'. -->

 <!DOCTYPE html>
  <html lang="en">
  <head>
    
    <title>Document</title>
  </head>
  <body>
    <script>
      let coffee = 5;
      console.log(`1 coffee : $${coffee *= 1}`);

       let bagels = 3;
      console.log(`1 coffee : $${bagels *= 2}`);

       let soup = 9;
      console.log(`1 coffee : $${soup *= 1}`);

      let cost = coffee + bagels + soup ;
      console.log(`cost : $${cost}`);
    </script>
  </body>
  </html>
