<!-- Continuing from 5c, display 'Cost of food: $${cost}' in the console -->


 <!DOCTYPE html>
  <html lang="en">
  <head>
    
    <title>Document</title>
  </head>
  <body>
    <script>
      let coffee = 5;
      console.log(`1 coffee : $${coffee *= 1}`);

       let bagels = 3;
      console.log(`1 coffee : $${bagels *= 2}`);

       let soup = 9;
      console.log(`1 coffee : $${soup *= 1}`);

      let cost = coffee + bagels + soup ;
      console.log(`cost : $${cost}`);
    </script>
  </body>
  </html>
