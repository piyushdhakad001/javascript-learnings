<!-- CHALLENGE EXERCISES:-
 12F.) Continuing from 12e, if we click the button, wait 1 to 1.5 seconds, and then click the button again, notice that the second time, the message disappears very quickly (because the first setTimeout is still running and will make the message disappear very soon).

 -> Modify the code so when we click the button, it "refreshes" the 2 second wait time (wait for 2 seconds again and removes message).
 
 -> Hint: you can cancel the previous setTimeout using clearTimeout()-->

 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Document</title>
 </head>
 <body>
    <button class="js-button" >Add to cart</button>
    <p class="js-Added"></p>

    <script>
      let timeoutId;
      
      document.querySelector('.js-button').addEventListener('click', () => {

        const addedElement = document.querySelector('.js-Added');
        
        addedElement.innerHTML = 'Added';

        clearTimeout(timeoutId);
        
        timeoutId = setTimeout(() => {
          addedElement.innerHTML = '';
          
        }, 2000);
        
      });
        
      
    </script>
 </body>
 </html>
