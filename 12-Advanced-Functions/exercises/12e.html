<!-- Create the 'Add to cart' button below. When clicking this button, display the message 'Added' below the button. Then, after 2 seconds, remove the message. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<body>
  <button class="js-add-button">
    Add to cart
  </button>
  <p class="js-message"></p>
  <script>
   
   document.querySelector('.js-add-button').addEventListener('click', () => {

     
     
     let addedElement = document.querySelector('.js-message');
     
     addedElement.innerHTML = 'Added';
     
     setTimeout(() => {
       addedElement.innerHTML = '';
      }, 2000)
      
    });
  </script>
</body>
</html>
