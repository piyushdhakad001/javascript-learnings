<!-- Continuing from exercise 12c, modify the button so that when we click it, the text immediately changes to 'Loading....,' and then after 1 second, it changes to 'Finished'. -->

<!DOCTYPE html>
<html>
  <head></head>
  <body>
    <button class="js-button" >Start</button>

    <script>
      // Grouping the JavaScript code into a function
      // is optional, but it is a bit cleaner.
    
         document.querySelector('.js-button').addEventListener('click', () => {

           const button = document.querySelector('.js-button');
           
           button.innerHTML = 'Loading...';
           
           setTimeout(() => {
             button.innerHTML = 'Finished!';
            }, 1000);
          
        });
    </script>
  </body>
</html>
