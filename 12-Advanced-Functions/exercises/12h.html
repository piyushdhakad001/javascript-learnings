<!-- Continuing from 12g, instead of displaying "(2) New messages" every time, save the number of messages in a variable: let messages = 2; 
 
-> Use the number in the variable to determine what title to display.
-> Create 2 buttons 'Add' / "Remove" that increase / decrease the 'messages' variable by 1.-->

<!DOCTYPE html>
<html>
  <head>
    <title>App</title>
  </head>
  <body>
    <button class="js-add-button" >Add</button>

    <button class="js-remove-button">Remove</button>

    <script>
      let messages = 2;

      document.querySelector('.js-add-button').addEventListener('click', () => {
        messages++;
      });

      document.querySelector('.js-remove-button').addEventListener('click', () => {
        messages--;
      });
        
        setInterval(() => {
          if (document.title === 'App') {
            document.title = `(${messages}) New messages`;
          } else {
            document.title = 'App';
          }
        }, 1000);
        </script>
  </body>
</html>
