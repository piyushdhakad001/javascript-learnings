<!-- Create a function countPosition(nums) that takes an array of numbers and returns how many numbers in the array are greater than 0.
 > countPositive([1, -3, 5]) => 2
 > countPositive([-2, 3, -5, 7, 10]) => 3  --> 

 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Document</title>
 </head>
 <body>
   <script>
     function countPositive(nums){
      let result = 0;

      for(let i = 0; i < nums.length; i++){
        if(nums[i] > 0){
          result++;
        }
      }
      return result;
    }
    console.log(countPositive([1, -3, 5]));
    console.log(countPositive([-2, 3, -5, 7, 10]));
   </script>
 </body>
 </html>
