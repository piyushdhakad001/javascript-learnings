<!-- Do exercises 11d and 11e, but using while loops. 11d.-> Create a for loop that counts up from 0 to 10, but counts up by 2 (0, 2, 4, ...., 8, 10)
 
11e. Create a for loop that counts down from 5 to 0.-> -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<body>
  <script>
    let i = 0;
    while(i <= 10){
      console.log(i);
      i += 2;
    }

    let j = 5;
    while (j >= 0){
      console.log(j);
      j--;
    }
  </script>
</body>
</html>
