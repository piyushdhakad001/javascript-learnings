<!-- Create a function countWords(words) that takes an array of strings and return an object with how many times each string appeared. 
 > countWords(['apple', 'grape', 'apple', 'apple']) => { apple: 3, grape: 1}
 (Hint: you can access a property using a variable: object[variable]; This uses the value inside the variable as the property name) -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <title>Document</title>
 </head>
 <body>
  <script>
    function countWords(words){

      const result = {};

      for(let i = 0; i < words.length; i++){
        const word = words[i];

        if(!result[word]){
          result[word] = 1;
        } else {
          result[word]++;
        }
      }
      return result;
    }

    console.log(countWords(['apple', 'grape', 'apple', 'apple']));
  </script>
 </body>
 </html>
