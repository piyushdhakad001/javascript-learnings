<!-- Create a function minMax(nums) that takes an array of numbers and returns an object with the minimum and maximum numbers in the array (do this using a loop instead of using something like Maath.min).
 > minMax([1, -3, 5]) => {min: -3, max: 5}
 > minMax([-2, 3, -5, 7, 10]) => { min: -5, max: 10 } -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
  
  <title>Document</title>
 </head>
 <body>
  <script>
    function minMax(nums){

      const result = {
        min: nums[0],
        max: nums[0]
      }

      for(let i = 0; i < nums.length; i++){
        if(nums[i] < result.min){
          result.min = nums[i];
        } 
        if(nums[i] > result.max){
          result.max = nums[i];
        }
      }

      return result;
    }

    console.log(minMax([1, -3, 5]));
    console.log(minMax([-2, 3, -5, 7, 10]));
  </script>
 </body>
 </html>
