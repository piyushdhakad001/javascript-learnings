<!-- Create a loop that takes an array of numbers and creates a new array where each number is increased by 1. 
 > [1, 2, 3] => [2, 3, 4] -->


 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Document</title>
 </head>
 <body>
  <script>
  
    const array = [1, 2, 3]
    const result = [];
    
    for(let i = 0; i < array.length; i++){
       result.push(array[i] + 1);
    }
    console.log(result);
  </script>
 </body>
 </html>
