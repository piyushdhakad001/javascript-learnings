<!--(11q) Create a function findIndex(array, word) that searches an array for a string (in the 'word' parameter) and returns the index of the first appearance of the string. If it doesn't exist in the array, return -1.
 -> findIndex(['green', 'red', 'blue', 'red']) => 1
 -> findIndex(['green', 'red', 'blue', 'red'], 'yellow')=> -1 -->

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Document</title>
</head>

<body>
  <script>
    function findIndex(array, word) {
      for (let i = 0; i < array.length; i++) {
        if (array[i] === word) {
          // Instead of creating an accumulator
          // variable and updating it in the loop,
          // we can just return i directly, when
          // we find it since this is a function.
          return i;
        }
      }
      // If the function has not returned by now,
      // logically that means the word must not
      // exist in the array, so we'll return -1.
      return -1;
    }
    console.log(findIndex(['green', 'red', 'blue', 'red'], 'red'));
    console.log(findIndex(['green', 'red', 'blue', 'red'], 'yellow'));

  </script>
</body>

</html>
