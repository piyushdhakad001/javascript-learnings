<!-- Exercises -6 : BOOLEANS AND IF-STATEMENTS -->
 <!-- 6A. Create a variable called 'hour' and save the current hour of the day (use 24-hour format and save it as a number between 0 and 23).
  ~If hour is between 6and 12, display 'Good morning!' in the console
  ~If hour is between 13 and 17, display 'Good afternoon!' in the console -->

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <title>Variable-Exercises</title>
  </head>
  <body>
    <script>
      const hour = 13;
      if(hour >= 6 && hour <= 12){
        console.log('Good Morning!');
      } else if (hour >= 13 && hour <=17){
        console.log('Good AfterNoon!');
      } else{
        console.log('Good night!')
      }
    </script>
  </body>
  </html>
