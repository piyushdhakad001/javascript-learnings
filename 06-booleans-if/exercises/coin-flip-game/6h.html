<!-- Instead of displaying 'heads' or 'tails' in the console, save the result in a variable called 'result' -->

 <!DOCTYPE html>
<html lang="en">
<head>
  <title>coin-flip Game</title>
</head>
<body>
  <script>
    const randNum = Math.random();
    let result;
    if(randNum >= 0.5){
      result = 'heads';
    } else{
      result = 'tails';
    }
    // console.log(result);
      </script>
</body>
</html>
