<!-- In exercises 5i - 5k, we created the 'Remove from cart', '-2', and '-3' buttons. Before updating the quantity, check if it will go below 0;
 ~ If it will, create a popup saying 'Not enough items in the chart' and don't update the quantity.
 ~Otherwise, updating the quantity and console.log() it as usual. -->

 <!DOCTYPE html>  
<html lang="en">
<head>
  <title>Cart Quantity</title>
</head>
<body>

    
  <button onclick="
   console.log(`cart quantity : ${cartQuantity}`);
  ">
    Show Quantity
  </button>

  <button onclick="
  if(cartQuantity >= 10){
    alert('The cart is full');
  } else {
    cartQuantity++;
    console.log(`cart quantity : ${cartQuantity}`);} 
  ">Add to cart</button>

  <button onclick="
   if(cartQuantity >= 9){
    alert('The cart is full');
  } else {
    cartQuantity += 2;
    console.log(`car quantity : ${cartQuantity}`);}
  ">+2</button>

  <button onclick="
   if(cartQuantity >= 8){
    alert('The cart is full');
  } else {
    cartQuantity += 3;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">+3</button>


  <button onclick="
  if(cartQuantity >= 8){
    alert('The cart is full');
  } else {
    cartQuantity += 4;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">
    +4
  </button>


  <button onclick="
  if(cartQuantity >= 6){
    alert('The cart is full');
  } else {
    cartQuantity += 5;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">
    +5
  </button>


  <button onclick="
  if(cartQuantity <= 0){
    alert('Not Enough items in the cart');
  } else {
    cartQuantity--;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">
    Remove from cart
  </button>

  <button onclick="
   if(cartQuantity <= 1){
    alert('Not Enough items in the cart');
  } else {
    cartQuantity -= 2;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">
    -2
  </button>

  <button onclick="
   if(cartQuantity <= 2){
    alert('Not Enough items in the cart');
  } else {
    cartQuantity -= 3;
    console.log(`cart quantity : ${cartQuantity}`);}
  ">
    -3
  </button>

  <button onclick="
    cartQuantity = 0;
    console.log('cart was reset');
    console.log(`cart quantity : ${cartQuantity}`);
  ">
    Reset Cart
  </button>


  <script>
    let cartQuantity = 0;
  </script>
</body>
</html>
