<!-- Create a function 'convertToCelcius(fahrenheit)'  that takes a number in degrees Fahrenheit and returns a number in degrees Celcius.
 ~ Formula: Celcius = (Fahrenheit - 32) * 5/9
 ~ convertToCelcius(86) => 30-->

  <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Functions</title>
 </head>
 <body>
   <script>
     function convertToCelcius(Fahrenheit){
        console.log(`${(Fahrenheit - 32) * 5 / 9} Celcius`);
    }
    convertToCelcius(86);
   </script>
 </body>
 </html>
