<!-- Update convertLength so that if yougive it an invalid unit, it will return `Invalid unit: ${unit}`.
 ~ convertLength(5, 'lbs', 'lbs') => 'invalid unit: lbs' -->


<!DOCTYPE html>
<html lang="en">

<head>
  <title>Document</title>
</head>

<body>
  <script>
    function convertLength(length, from, to) {
      if (from === 'km' && to === 'km') {
        finalLength = length + ' km';

      } else if (from === 'miles' && to === 'km') {
        finalLength = (length * 1.6) + ' km';

      } else if (from === 'km' && to === 'miles') {
        finalLength = (length / 1.6) + ' miles';

      } else if (from === 'km' && to === 'ft') {
        finalLength = (length * 3281) + ' ft';

      } else if (from === 'miles' && to === 'ft') {
        finalLength = (length * 5280) + ' ft'
      } else if(from === 'km', 'miles', 'ft'){
        finalLength = `Invalid unit: ${to}`;
      } else {
        finalLength = `Invalid unit: ${from}`;
      }
      console.log(finalLength);
    }
    convertLength(5, 'miles', 'km');
    convertLength(5, 'miles', 'ft');
    convertLength(5, 'km', 'ft');
    convertLength(5, 'km', 'lbs');

  </script>
</body>

</html>
