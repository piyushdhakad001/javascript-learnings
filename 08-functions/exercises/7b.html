<!-- Continuing from 7a, add a parameter called 'name' to the 'greet' function and display the message: 'Hello ${name}!'
 Call the function a few times with diffrent names: greet('Simon'); -->

 

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Functions</title>
</head>
<body>
  <script>
    function greet(name){
      console.log(`Hello ${name}`);
    }
    greet('Simon');
    greet('Andrew');
    greet('Jack');
    greet('Callis');
  </script>
</body>
</html>
