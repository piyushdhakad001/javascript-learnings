 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Document</title>
 </head>
  <style>
    .js-button, .js-button2, .js-button3{
      background-color: black;
      color: white;
      padding: 8px 18px 8px 18px;
      font-size: 20px;
      border-radius: 5px;
      border: none;
      margin: 5px;
    }
    .is-toggled {
      background-color: rgb(226, 226, 226);
      color: black;
     
    }
  </style>
 <body>
  <button class="toggle-button js-button" onclick="
    const button = document.querySelector('.js-button');
    if(!button.classList.contains('is-toggled')){
      button.classList.add('is-toggled');
    } else {
      button.classList.remove('is-toggled');
    }
    ">Gaming</button>

    <button class="toggle-button2 js-button2" onclick="
    const button2 = document.querySelector('.js-button2');
    if(!button2.classList.contains('is-toggled')){
      button2.classList.add('is-toggled');
    } else {
      button2.classList.remove('is-toggled');
    }
    ">Music</button>
    
    <button class="toggle-button js-button3" onclick="
    const button3 = document.querySelector('.js-button3');
    if(!button3.classList.contains('is-toggled')){
      button3.classList.add('is-toggled');
    } else {
      button3.classList.remove('is-toggled');
    }
    ">Tech</button>
  
 </body>
 </html>
