<!-- Create an if statement and check:
 ~ if the number is less than 0.5, then display 'heads' in the console.
 ~Else display 'tails' in the console. -->

 <!DOCTYPE html>
<html lang="en">
<head>
  <title>coin-flip Game</title>
</head>
<body>
  <script>
    const randNum = Math.random();
    
    if(randNum >= 0.5){
      console.log('head');
    } else{
      console.log('tails')
    }
      </script>
</body>
</html>
