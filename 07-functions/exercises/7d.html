<!-- Create a function 'convertToFahrenheit(Celcius)' that takes a number indegrees Celcius and returns a number in degrees Fahrenheit.
 ~ Formula: Fahrenheit = (Celcius * 9/5) + 32 
 ~ convertToFahrenheit(25) => 77 -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
  <title>Functions</title>
 </head>
 <body>
   <script>
     function convertToFahrenheit(celcius){
        console.log(`${(celcius * (9 / 5)) + 32} Fahrenheit`);
    }
    convertToFahrenheit(25);
   </script>
 </body>
 </html>
